<svg xmlns="http://www.w3.org/2000/svg" width="250" height="135" viewBox="0 0 250 135">
  <defs>
    <filter id="navy" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feFlood flood-color="#0b1a2b" result="brandColor"/>
      <feComposite in="brandColor" in2="SourceAlpha" operator="in"/>
    </filter>
  </defs>
  <image width="250" height="135" href="./naif-logo.svg" filter="url(#navy)"/>
</svg>
